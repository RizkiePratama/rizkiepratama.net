<!DOCTYPE html>
<html lang="en">
    {% include head.html %}
    <body id="landing" class="d-flex flex-fill flex-column">
      <!-- Landing Header -->
      {% include header.html %}

      <!-- Home -->
      <main id="swup" class="transition-fade">
      <section id="home" class="container-fluid p-0 m-0">
        <!-- HUD Frame (top left via CSS) -->
        <div class="landing-hud-frame" id="landing-hud-frame">
          <div class="hud-bracket hud-bracket-tl"></div>
          <div class="hud-bracket hud-bracket-br"></div>
          <div class="hud-bracket hud-bracket-tr"></div>
          <div class="hud-bracket hud-bracket-bl"></div>
          
          <p class="sys-meta">[SYS.ID: XXXXXX] <span class="accent-text">// ONLINE</span></p>
          <h1 class="home-name decode-text" data-value="RIZKIE PRATAMA">XXXXXXXXXXXXXXXX</h1>
          <h2 class="terminal-role">> <span id="landing-typewriter"></span><span class="blinking-cursor">█</span></h2>
          
          <span id="role-strings" style="display:none;"
            data-dev="{% t global.soft_dev %}"
            data-vid="{% t global.video_editor %}"
            data-pho="{% t global.photog %}"
            data-game="{% t global.game_dev %}"
            {% if site.lang == 'jp' %}
            data-dev-kana="ソフトウェアかいはつしゃ"
            data-vid-kana="どうがへんしゅうしゃ"
            data-pho-kana="しゃしんか"
            data-game-kana="ゲームかいはつしゃ"
            {% endif %}>
          </span>
        </div>
        
        <!-- Scanline overlay (CSS handles styling) -->
        <div class="scanline-overlay"></div>

        <div class="fixed-bottom">
          <!-- Languages list-->
          <div class="fixed-block block-right">
            <ul class="list-unstyled languages-list">
              <li><a href="/"><span class="single-language">{% t global.english %}</span></a></li>
              <li><a href="/jp/"><span class="single-language">{% t global.japanese %}</span></a></li>
            </ul>
          </div>
        </div>
      </section>
      </main>
      <!-- Footer -->
      {% include footer.html %}
    </body>
</html>
